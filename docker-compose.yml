# Requires a root `.env` (copy from `.env.example`). Do not commit real secrets.
services:
  postgres:
    image: postgres:16-alpine
    container_name: spa-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-spa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env - see .env.example}
      POSTGRES_DB: ${POSTGRES_DB:-spa_booking}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-spa} -d ${POSTGRES_DB:-spa_booking}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spa-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: spa-api
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      APP_ENV: ${APP_ENV:-development}
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://${POSTGRES_USER:-spa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-spa_booking}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-string}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-168h}
      JWT_2FA_TEMP_TTL: ${JWT_2FA_TEMP_TTL:-5m}
      OAUTH_STATE_TTL: ${OAUTH_STATE_TTL:-10m}
      TOTP_ISSUER: ${TOTP_ISSUER:-SpaBooking}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      OAUTH_REDIRECT_URL: ${OAUTH_REDIRECT_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Apply SQL migrations only (same embedded files as API). Does not start Redis.
  # Usage: docker compose --profile tools run --rm migrate
  migrate:
    profiles: [tools]
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: spa-migrate
    entrypoint: ["/app/migrate"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-spa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-spa_booking}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
